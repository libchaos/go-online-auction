version: "2"
sql:
  - engine: "postgresql"
    # sqlc understands the goose migration format and ignores the Down sections,
    # so the goose migrations are the single source of truth for the schema.
    schema: "migrations"
    queries: "internal/modules/auction/infra/query"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/modules/auction/infra/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        omit_unused_structs: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true
  - engine: "postgresql"
    schema: "migrations"
    queries: "internal/modules/users/infra/query"
