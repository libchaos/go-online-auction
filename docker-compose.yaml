# ==============================================================================
# docker-compose.yaml —— 已停用（2026-07-22）
#
# 本项目改为使用「本地」PostgreSQL 与 NATS（直接装在运行 Go 的同一台机器上），
# 不再依赖容器。下面所有 service 定义已整体注释掉，仅作存档参考。
#
# 本地启动方式（PostgreSQL + NATS 装在 WSL Ubuntu-22.04 内，与 Go 同机）：
#   1) PostgreSQL:
#        sudo apt-get update && sudo apt-get install -y postgresql
#        sudo pg_ctlcluster 19 main start            # 版本号以实际安装为准
#        sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'postgres';"
#        sudo -u postgres psql -c "CREATE DATABASE \"go-online-auction\";"
#   2) NATS（需 JetStream）:
#        # 方式 A：官方二进制
#        curl -sf https://binaries.nats.dev/nats-io/nats-server/v2@latest | tar xz
#        sudo mv nats-server /usr/local/bin/ && sudo chmod +x /usr/local/bin/nats-server
#        # 方式 B：用项目里的 Go 直接装
#        /home/chaos/.encore/encore-go/bin/go install github.com/nats-io/nats-server/v2@latest
#        # 启动（开启 JetStream，数据落 /tmp/nats）
#        nats-server -js -sd /tmp/nats > /tmp/nats.log 2>&1 &
#   3) 配置 .env（默认值即可，均指向 localhost）:
#        DB_HOST=localhost  DB_PORT=5432  DB_USER=postgres  DB_PASS=postgres
#        DB_NAME=go-online-auction  DB_SSL_MODE=false
#        NATS_URL=nats://localhost:4222
#   4) 跑迁移:   go run ./main.go db:migrate
#   5) 建管理员: go run ./main.go create-admin --name admin --email a@b.com --password '<强密码>'
#   6) g-RBAC 引导（必做）: 用 admin 登录后
#        POST /api/v1/rbac/role-assignments  {"user_id":<id>,"role":"admin"}
#   7) 起后端:   go run ./main.go all        # 监听 :9000
#
# 注意：所有 go / make 命令必须在 WSL 内执行（Encore 捆绑 Go），不能从 Windows 直接跑。
