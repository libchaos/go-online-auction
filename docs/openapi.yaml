    delete:
      tags: [Notifications]
      summary: Remove a SPU from the watchlist
      parameters:
        - name: spuId
          in: path
          required: true
          schema: { type: integer }
          example: 55
      responses:
        '204': { description: Deleted (no content) }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ============================ Payment ============================
  /api/v1/payment/deposit:
    post:
      tags: [Payment]
      summary: Create a recharge (face-to-face pay)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PaymentCreateDepositRequest' }
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: '#/components/schemas/PaymentCreateDepositResponse' } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/payment/deposit/{id}:
    get:
      tags: [Payment]
      summary: Get a payment by id
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
          example: 6001
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: '#/components/schemas/PaymentDepositResponse' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/payment/withdraw:
    post:
      tags: [Payment]
      summary: Create an Alipay withdrawal
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateWithdrawalRequest' }
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: '#/components/schemas/CreateWithdrawalResponse' } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/payment/withdraw/{id}:
    get:
      tags: [Payment]
      summary: Get a withdrawal by id
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
          example: 6101
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: '#/components/schemas/WithdrawalResponse' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/payment/alipay/notify:
    post:
      tags: [Payment]
      summary: Alipay async payment notification callback (public, server-to-server)
      description: Called by Alipay; must NOT require authentication.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: { type: string }
              description: Raw Alipay notify parameters (sign, out_tiz_no, trade_status, ...).
      responses:
        '200':
          description: Acknowledged (responds with `success` to Alipay).
          content:
            text/plain:
              schema: { type: string, example: success }

  # ============================ Realtime (WebSocket) ============================
  /ws/v1/auctions/{id}:
    get:
      tags: [Realtime]
      summary: WebSocket stream of auction updates
      description: |
        Upgrade to WebSocket. Requires `Authorization: Bearer <token>` (or the
        `token` query param). Pushes bid/price/state events for the auction.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
          example: 77
        - name: token
          in: query
          required: false
          schema: { type: string }
      responses:
        '101': { description: Switching Protocols (WebSocket upgrade) }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /ws/v1/deposits:
    get:
      tags: [Realtime]
      summary: WebSocket stream of the user's deposit events
      description: "Upgrade to WebSocket; requires Authorization: Bearer <token>."
      responses:
        '101': { description: Switching Protocols (WebSocket upgrade) }
        '401': { $ref: '#/components/responses/Unauthorized' }
